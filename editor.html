<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Defense - Editor Completo</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a12;
            --panel: #141423;
            --accent: #00ffcc;
            --text: #e0e6ed;
            --border: #2a2a40;
            --danger: #ff2a6d;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar List */
        .sidebar {
            width: 320px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
            z-index: 10;
        }
        .header {
            font-size: 1.5rem; color: var(--accent); text-transform: uppercase;
            text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--border);
            padding-bottom: 10px; font-weight: 800;
        }
        .tab-btn {
            background: #222; color: #888; border: 1px solid #444; padding: 10px;
            cursor: pointer; flex: 1; font-weight: bold; font-family: inherit; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .tabs { display: flex; margin-bottom: 10px; gap: 2px; }
        
        .list-item {
            background: rgba(255,255,255,0.05); padding: 8px 12px; margin-bottom: 5px;
            cursor: pointer; border: 1px solid transparent; display: flex;
            justify-content: space-between; align-items: center; border-radius: 4px;
            transition: 0.2s;
        }
        .list-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .list-item.active { background: var(--accent); color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(0,255,204,0.3); }
        
        /* Main Editor Area */
        .editor-area {
            flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }
        .form-group {
            background: rgba(20, 20, 35, 0.9); padding: 20px; border: 1px solid var(--border);
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .form-title { color: var(--accent); margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 5px; font-weight: bold;}
        
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; color: #888; font-size: 0.85rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select {
            width: 100%; background: #0a0a12; border: 1px solid #444; color: white;
            padding: 10px; font-family: monospace; border-radius: 4px; font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        input[type="color"] { height: 42px; padding: 2px; cursor: pointer; }
        
        textarea { height: 200px; resize: vertical; line-height: 1.4; }

        .btn {
            padding: 10px 20px; background: var(--accent); color: #000; border: none;
            font-weight: bold; cursor: pointer; font-family: inherit; text-transform: uppercase;
            font-size: 0.9rem; border-radius: 4px; transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        
        .play-btn {
            position: fixed; bottom: 30px; right: 30px; 
            padding: 20px 40px; font-size: 1.2rem; 
            background: linear-gradient(45deg, #00e676, #00c853); 
            color: #000; box-shadow: 0 0 20px rgba(0,230,118,0.4);
            border-radius: 50px; border: 2px solid #fff; z-index: 100;
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,230,118,0.6); }

        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        
        .import-box {
            margin-top: auto; padding-top: 20px; border-top: 1px solid #333;
        }
        .import-box input { margin-bottom: 5px; font-size: 0.8rem; }
        .hint { font-size: 0.75rem; color: #666; margin-top: 3px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="header">NEON EDITOR V2</div>
    
    <div style="margin-bottom: 20px;">
        <label>Nombre del Creador</label>
        <input type="text" id="creator-name" value="Jugador" placeholder="Tu nombre...">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('towers')">TORRES</button>
        <button class="tab-btn" onclick="switchTab('enemies')">ENEMIGOS</button>
    </div>
    
    <div class="toolbar">
        <button class="btn" style="flex:1; background:#333; color:#fff; border:1px solid #555" onclick="addNewItem()">+ Crear Nuevo</button>
        <button class="btn btn-danger" style="width: 50px;" onclick="deleteItem()" title="Borrar seleccionado">X</button>
    </div>

    <div id="item-list" style="flex:1; overflow-y:auto; min-height: 200px;">
        <!-- JS Populated -->
    </div>

    <div class="import-box">
        <label>IMPORTAR CONFIGURACIÓN</label>
        <input type="text" id="import-url" placeholder="Pega la URL custom aquí...">
        <button class="btn" style="width:100%; font-size:0.8rem; background: #2979ff; color: white;" onclick="importFromUrl()">CARGAR DATOS</button>
        <div class="hint">Copia el enlace de un juego custom y pégalo para editarlo.</div>
    </div>
</div>

<div class="editor-area" id="editor-content">
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#555; text-align:center;">
        <div style="font-size:4rem; margin-bottom:20px;">🛠️</div>
        <div>Selecciona una Torre o Enemigo<br>de la lista izquierda para comenzar.</div>
    </div>
</div>

<button class="btn play-btn" onclick="exportAndPlay()">JUGAR CUSTOM ▶</button>

let ENEMIES = {
  basic: { hp: 14, speed: 1.5, money: 5, color: "#e0e0e0", radius: 10, immune: false },
  fast: { hp: 12, speed: 3.2, money: 7, color: "#ffea00", radius: 8, immune: false },
  tank: { hp: 90, speed: 0.8, money: 25, color: "#ff3d00", radius: 14, immune: false },
  special: { hp: 30, speed: 1.6, money: 14, color: "#d500f9", radius: 11, immune: true },
  boss: { hp: 450, speed: 0.55, money: 300, color: "#b71c1c", radius: 22, immune: false },
  white_guard: { hp: 2500, speed: 0.6, money: 150, color: "#ffffff", radius: 16, immune: false },
  white_boss: { hp: 3000, speed: 0.45, money: 1200, color: "#ffffff", radius: 25, immune: true },
  mecha_hydra: { hp: 4500, speed: 0.4, money: 2500, color: "#00ff00", radius: 28, immune: false },
  cyber_angel: { hp: 4200, speed: 1.1, money: 3000, color: "#00ccff", radius: 20, immune: true },
  galactic_devourer: { hp: 9000, speed: 0.3, money: 4000, color: "#ff00ff", radius: 30, immune: true },
  void_boss: { hp: 14000, speed: 0.35, money: 6000, color: "#311b92", radius: 28, immune: true },
  chaos_lord: { hp: 40000, speed: 0.3, money: 20000, color: "#000000", radius: 35, immune: true },
  neon_god: { hp: 80000, speed: 0.25, money: 60000, color: "#ffd700", radius: 32, immune: true },
  entity_zero: { hp: 350000, speed: 0.2, money: 1000000, color: "#ffffff", radius: 40, immune: true }
};

let currentTab = 'towers';
let selectedKey = null;

function renderList() {
    const list = document.getElementById('item-list');
    list.innerHTML = '';
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    
    Object.keys(data).forEach(key => {
        const item = data[key];
        const el = document.createElement('div');
        el.className = `list-item ${selectedKey === key ? 'active' : ''}`;
        el.innerHTML = `<span>${item.name || key}</span> <span style="font-size:0.75em; opacity:0.6; font-family:monospace">${key}</span>`;
        el.onclick = () => selectItem(key);
        list.appendChild(el);
    });
}

function switchTab(tab) {
    currentTab = tab;
    selectedKey = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderList();
    document.getElementById('editor-content').innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#555; text-align:center;">
            <div style="font-size:4rem; margin-bottom:20px;">🛠️</div>
            <div>Selecciona una Torre o Enemigo<br>de la lista izquierda para comenzar.</div>
        </div>
    `;
}

function selectItem(key) {
    selectedKey = key;
    renderList();
    renderEditor();
}

function renderEditor() {
    if(!selectedKey) return;
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    const item = data[selectedKey];
    const container = document.getElementById('editor-content');
    
    const commonFields = currentTab === 'towers' 
        ? ['name', 'cost', 'dmg', 'range', 'rate', 'color', 'symbol']
        : ['hp', 'speed', 'money', 'color', 'radius'];

    // Info útil sobre rate y range
    let hint = "";
    if(currentTab === 'towers') {
        hint = `
        <div style="font-size:0.8rem; color:#888; margin-bottom:20px; background:rgba(255,255,255,0.05); padding:10px; border-radius:4px;">
            ℹ️ <b>AYUDA RÁPIDA:</b><br>
            <b>Range (Rango):</b> Usa números pequeños para Casillas (ej: 4) o grandes para Píxeles (ej: 160). 1 Casilla = 40px.<br>
            <b>Rate (Velocidad):</b> Usa números pequeños para Disparos/Seg (ej: 2) o grandes para Frames de espera (ej: 30). 60 Frames = 1 segundo.
        </div>`;
    }

    let fields = `<div class="form-group"><div class="form-title">ATRIBUTOS PRINCIPALES</div><div class="field-row">`;
    
    commonFields.forEach(k => {
        let val = item[k] !== undefined ? item[k] : '';
        let type = 'text';
        if(k === 'color') type = 'color';
        if(typeof item[k] === 'number') type = 'number';
        
        fields += `
            <div>
                <label>${k.toUpperCase()}</label>
                <input type="${type}" value="${val}" onchange="updateField('${k}', this.value, '${type}')">
            </div>
        `;
    });
    fields += `</div></div>`;

    let advancedLabel = currentTab === 'towers' 
        ? "MEJORAS (UPGRADES) Y EXTRAS"
        : "PROPIEDADES ESPECIALES (IMMUNE, BOSS)";

    fields += `
        <div class="form-group">
            <div class="form-title">${advancedLabel} (JSON)</div>
            <label style="margin-bottom:10px">Edita aquí directamente el código de mejoras y banderas especiales.</label>
            <textarea id="json-editor" onchange="updateJson()">${JSON.stringify(item, null, 2)}</textarea>
        </div>
    `;

    container.innerHTML = `
        <h2 style="color:var(--accent); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">
            EDITANDO: ${item.name || selectedKey} 
            <span style="font-size:0.6em; color:#666; margin-left:10px; font-weight:normal">ID: ${selectedKey}</span>
        </h2>
        ${hint}
        ${fields}
    `;
}

window.updateField = function(key, val, type) {
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    if(type === 'number') val = parseFloat(val);
    data[selectedKey][key] = val;
    const jsonEditor = document.getElementById('json-editor');
    if(jsonEditor) jsonEditor.value = JSON.stringify(data[selectedKey], null, 2);
    renderList();
};

window.updateJson = function() {
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    const val = document.getElementById('json-editor').value;
    try {
        const parsed = JSON.parse(val);
        data[selectedKey] = parsed;
        renderList();
        renderEditor(); 
    } catch(e) {
        alert("JSON Inválido: " + e.message);
    }
};

window.addNewItem = function() {
    const id = prompt("ID único para el nuevo elemento (ej: super_tower):");
    if(!id) return;
    // Sanitizar ID
    const safeId = id.replace(/[^a-zA-Z0-9_]/g, '').toLowerCase();
    
    if(currentTab === 'towers') {
        if(TOWERS[safeId]) return alert("Ya existe.");
        TOWERS[safeId] = { name: "Nueva Torre", type: "cannon", color: "#ffffff", cost: 100, dmg: 10, range: 120, rate: 60, upgrades: [] };
    } else {
        if(ENEMIES[safeId]) return alert("Ya existe.");
        ENEMIES[safeId] = { hp: 100, speed: 1, money: 10, color: "#ff0000", radius: 10, immune: false };
    }
    selectItem(safeId);
};

window.deleteItem = function() {
    if(!selectedKey) return;
    if(!confirm(`¿Estás seguro de borrar ${selectedKey}?`)) return;
    if(currentTab === 'towers') delete TOWERS[selectedKey];
    else delete ENEMIES[selectedKey];
    selectedKey = null;
    renderList();
    document.getElementById('editor-content').innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#555; text-align:center;">
            <div style="font-size:4rem; margin-bottom:20px;">🗑️</div>
            <div>Elemento eliminado.</div>
        </div>
    `;
};

window.exportAndPlay = function() {
    const creator = document.getElementById('creator-name').value;
    const exportData = {
        towers: TOWERS,
        enemies: ENEMIES,
        name: creator
    };
    
    const jsonStr = JSON.stringify(exportData);
    const b64 = btoa(unescape(encodeURIComponent(jsonStr))); 
    
    console.log("Tamaño de datos (bytes):", b64.length);
    
    // Si es muy grande, advertir pero abrir igual
    if(b64.length > 30000) {
        // En un entorno real usaríamos localStorage o Firebase, pero para este ejercicio URL es lo solicitado.
        console.warn("URL muy larga");
    }

    const url = `custom.html?config=${b64}`;
    window.open(url, '_blank');
};

window.importFromUrl = function() {
    const input = document.getElementById('import-url').value;
    if(!input) return alert("Por favor pega una URL o código de configuración.");
    
    let configStr = input;
    
    // Intentar extraer el parámetro si es una URL completa
    if(input.includes('config=')) {
        try {
            const urlObj = new URL(input);
            configStr = urlObj.searchParams.get('config');
        } catch(e) {
            // Si falla el parsing de URL, quizás es una cadena parcial, intentamos split manual
            const parts = input.split('config=');
            if(parts.length > 1) configStr = parts[1];
        }
    }
    
    if(!configStr) return alert("No se encontró código de configuración válido.");
    
    try {
        const jsonStr = decodeURIComponent(escape(atob(configStr)));
        const data = JSON.parse(jsonStr);
        
        if(data.towers) TOWERS = data.towers;
        if(data.enemies) ENEMIES = data.enemies;
        if(data.name) document.getElementById('creator-name').value = data.name;
        
        alert(`Configuración de "${data.name || 'Desconocido'}" cargada con éxito!`);
        renderList();
        if(selectedKey) renderEditor(); // Refrescar si había algo abierto
        
    } catch(e) {
        console.error(e);
        alert("Error al importar: El código parece corrupto o inválido.");
    }
};

// Start
renderList();

</script>
</body>
</html>

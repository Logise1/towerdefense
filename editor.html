    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN EXPLÍCITA (Sin variables de entorno)
        const firebaseConfig = {
            apiKey: "AIzaSyDPCHIEH-oG60kLBnOf98Qwtj56DFLcPaE",
            authDomain: "towerdefense-dfbfb.firebaseapp.com",
            projectId: "towerdefense-dfbfb",
            storageBucket: "towerdefense-dfbfb.firebasestorage.app",
            messagingSenderId: "780250375670",
            appId: "1:780250375670:web:ccded917e7b2316e5013d7",
            measurementId: "G-4GW89G9D55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Identificador fijo para la colección (ya no depende del entorno)
        const appId = 'towerdefense-public-v1';

        window.AuthManager = {
            user: null,
            login: async (emailRaw, password) => {
                const email = emailRaw.includes('@') ? emailRaw : `${emailRaw}@email.com`;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    closeModal('auth-modal');
                } catch (error) { showAuthError("Error: " + error.message); }
            },
            register: async (emailRaw, password) => {
                const email = emailRaw.includes('@') ? emailRaw : `${emailRaw}@email.com`;
                try {
                    await createUserWithEmailAndPassword(auth, email, password);
                    closeModal('auth-modal');
                } catch (error) { showAuthError("Error: " + error.message); }
            },
            logout: async () => { await signOut(auth); }
        };

        window.CloudManager = {
            save: async (data, name) => {
                if (!auth.currentUser) {
                    openModal('auth-modal');
                    return null;
                }
                const btn = document.getElementById('save-btn');
                const oldText = btn.innerText;
                btn.innerText = "GUARDANDO...";
                btn.disabled = true;

                try {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'custom_modes'), {
                        name: name,
                        author: auth.currentUser.email.split('@')[0],
                        authorUid: auth.currentUser.uid,
                        data: JSON.stringify(data),
                        timestamp: Date.now()
                    });
                    
                    btn.innerText = "GUARDADO ✔";
                    setTimeout(() => { btn.innerText = oldText; btn.disabled = false; }, 2000);
                    
                    const url = `custom.html?id=${docRef.id}`;
                    window.open(url, '_blank');
                    
                    window.CloudManager.listMyCustoms();

                } catch (e) {
                    console.error(e);
                    alert("Error guardando: " + e.message);
                    btn.innerText = oldText; btn.disabled = false;
                }
            },
            listMyCustoms: async () => {
                if (!auth.currentUser) return;
                const listContainer = document.getElementById('my-customs-list');
                listContainer.innerHTML = '<div style="text-align:center; color:#666">Cargando...</div>';
                
                try {
                    const snapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'custom_modes'));
                    const myCustoms = [];
                    snapshot.forEach(doc => {
                        const d = doc.data();
                        if(d.authorUid === auth.currentUser.uid) {
                            myCustoms.push({id: doc.id, ...d});
                        }
                    });

                    myCustoms.sort((a,b) => b.timestamp - a.timestamp);

                    listContainer.innerHTML = '';
                    if (myCustoms.length === 0) {
                        listContainer.innerHTML = '<div style="text-align:center; color:#666">No tienes creaciones guardadas.</div>';
                        return;
                    }

                    myCustoms.forEach(c => {
                        const el = document.createElement('div');
                        el.className = 'list-item';
                        el.innerHTML = `
                            <div style="flex:1">
                                <div style="font-weight:bold; color:var(--accent)">${c.name}</div>
                                <div style="font-size:0.7em; color:#666">${new Date(c.timestamp).toLocaleDateString()}</div>
                            </div>
                            <button class="btn" style="padding:4px 8px; font-size:0.7em; margin-left:5px" onclick="window.loadFromCloud('${c.id}', '${escape(c.data)}')">EDITAR</button>
                            <button class="btn btn-danger" style="padding:4px 8px; font-size:0.7em; margin-left:5px" onclick="window.open('custom.html?id=${c.id}', '_blank')">JUGAR</button>
                        `;
                        listContainer.appendChild(el);
                    });
                } catch (e) {
                    console.error(e);
                    listContainer.innerHTML = '<div style="text-align:center; color:red">Error al cargar lista.</div>';
                }
            }
        };

        // Listener de Auth estándar (sin tokens anónimos ni custom del entorno)
        onAuthStateChanged(auth, (user) => {
            const display = document.getElementById('auth-status');
            const loginBtn = document.getElementById('btn-login-sidebar');
            const customsTab = document.getElementById('tab-customs');
            
            if (user) {
                const name = user.email ? user.email.split('@')[0] : 'Anon';
                display.innerHTML = `HOLA, <span style="color:var(--accent)">${name.toUpperCase()}</span> <span style="cursor:pointer; font-size:0.8em; color:#666" onclick="window.AuthManager.logout()">(SALIR)</span>`;
                loginBtn.style.display = 'none';
                customsTab.style.display = 'block';
                document.getElementById('creator-name').value = name;
                window.CloudManager.listMyCustoms();
            } else {
                display.innerText = "NO LOGUEADO";
                loginBtn.style.display = 'block';
                customsTab.style.display = 'none';
                document.getElementById('my-customs-list').innerHTML = '';
            }
        });

    </script>
    <style>
        :root {

            background-color: var(--bg);

            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            width: 340px;
            background: var(--panel);

        }
        .auth-bar {
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;
        }
        
        .tab-btn {
            background: #222; color: #888; border: 1px solid #444; padding: 10px;
            cursor: pointer; flex: 1; font-weight: bold; font-family: inherit; transition: 0.2s; font-size: 0.8rem;
        }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .tabs { display: flex; margin-bottom: 10px; gap: 2px; }
        
        .list-item {
            background: rgba(255,255,255,0.05); padding: 8px 12px; margin-bottom: 5px;
            cursor: pointer; border: 1px solid transparent; display: flex;
            justify-content: space-between; align-items: center; border-radius: 4px;
            transition: 0.2s;
        }
        .list-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .list-item.active { background: var(--accent); color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(0,255,204,0.3); }
        
        .editor-area {
            flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }
        .form-group {
            background: rgba(20, 20, 35, 0.9); padding: 20px; border: 1px solid var(--border);
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .form-title { color: var(--accent); margin-bottom: 15px; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 5px; font-weight: bold;}
        
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; color: #888; font-size: 0.85rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select {
            width: 100%; background: #0a0a12; border: 1px solid #444; color: white;
            padding: 10px; font-family: monospace; border-radius: 4px; font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        input[type="color"] { height: 42px; padding: 2px; cursor: pointer; }
        
        textarea { height: 200px; resize: vertical; line-height: 1.4; }

        .btn {
            padding: 10px 20px; background: var(--accent); color: #000; border: none;
            font-weight: bold; cursor: pointer; font-family: inherit; text-transform: uppercase;
            font-size: 0.9rem; border-radius: 4px; transition: 0.2s; text-align: center;
        }
        .btn:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: var(--danger); color: white; }
        
        .play-btn {
            position: fixed; bottom: 30px; right: 30px; 
            padding: 20px 40px; font-size: 1.2rem; 
            background: linear-gradient(45deg, #00e676, #00c853); 
            color: #000; box-shadow: 0 0 20px rgba(0,230,118,0.4);
            border-radius: 50px; border: 2px solid #fff; z-index: 100;
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,230,118,0.6); }

        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 1px solid var(--accent); padding: 30px; border-radius: 8px; width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .modal-header { font-size: 1.5rem; color: white; text-align: center; margin-bottom: 10px; }
        .close-modal { float: right; cursor: pointer; color: #666; }
        #auth-error-msg { color: var(--danger); text-align: center; font-size: 0.9rem; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>

        <div style="display:flex; gap:10px;">

            <button class="btn" style="flex:1; background:#333; color:#aaa" onclick="submitAuth('register')">REGISTRARSE</button>

</div>

let currentTab = 'towers';
let selectedKey = null;

function renderList() {
    const list = document.getElementById('item-list');
    list.innerHTML = '';
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    
    Object.keys(data).forEach(key => {
        const item = data[key];
        const el = document.createElement('div');
        el.className = `list-item ${selectedKey === key ? 'active' : ''}`;
        el.innerHTML = `<span>${item.name || key}</span> <span style="font-size:0.75em; opacity:0.6; font-family:monospace">${key}</span>`;
        el.onclick = () => selectItem(key);
        list.appendChild(el);
    });
}

function switchTab(tab) {
    currentTab = tab;
    selectedKey = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    const itemList = document.getElementById('item-list');
    const myCustoms = document.getElementById('my-customs-list');
    const mainToolbar = document.getElementById('main-toolbar');
    const editorContent = document.getElementById('editor-content');

    if (tab === 'my-customs') {
        itemList.style.display = 'none';
        mainToolbar.style.display = 'none';
        myCustoms.style.display = 'block';
        window.CloudManager.listMyCustoms();
        editorContent.innerHTML = '<div style="text-align:center;color:#666;margin-top:50px">Gestiona tus niveles guardados</div>';
    } else {
        itemList.style.display = 'block';
        mainToolbar.style.display = 'flex';
        myCustoms.style.display = 'none';
        renderList();
        editorContent.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#555; text-align:center;">
                <div style="font-size:4rem; margin-bottom:20px;">🛠️</div>
                <div>Selecciona una Torre o Enemigo<br>de la lista izquierda para comenzar.</div>
            </div>
        `;
    }
}

function selectItem(key) {
    selectedKey = key;
    renderList();
    renderEditor();
}

function renderEditor() {
    if(!selectedKey) return;
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    const item = data[selectedKey];
    const container = document.getElementById('editor-content');
    
    const commonFields = currentTab === 'towers' 
        ? ['name', 'cost', 'dmg', 'range', 'rate', 'color', 'symbol']
        : ['hp', 'speed', 'money', 'color', 'radius'];

    // Info útil sobre rate y range
    let hint = "";
    if(currentTab === 'towers') {
        hint = `
        <div style="font-size:0.8rem; color:#888; margin-bottom:20px; background:rgba(255,255,255,0.05); padding:10px; border-radius:4px;">
            ℹ️ <b>AYUDA RÁPIDA:</b><br>
            <b>Range (Rango):</b> Está en <b>Casillas</b> (3 = 3 tiles de distancia).<br>
            <b>Rate (Velocidad):</b> Está en <b>Disparos por Segundo</b> (1.5 = 1.5 disparos/s).
        </div>`;
    }

    let fields = `<div class="form-group"><div class="form-title">ATRIBUTOS PRINCIPALES</div><div class="field-row">`;
    
    commonFields.forEach(k => {
        let val = item[k] !== undefined ? item[k] : '';
        let type = 'text';
        if(k === 'color') type = 'color';
        if(typeof item[k] === 'number') type = 'number';
        
        fields += `
            <div>
                <label>${k.toUpperCase()}</label>
                <input type="${type}" value="${val}" onchange="updateField('${k}', this.value, '${type}')">
            </div>
        `;
    });
    fields += `</div></div>`;

    let advancedLabel = currentTab === 'towers' 
        ? "MEJORAS (UPGRADES) Y EXTRAS"
        : "PROPIEDADES ESPECIALES (IMMUNE, BOSS)";

    fields += `
        <div class="form-group">
            <div class="form-title">${advancedLabel} (JSON)</div>
            <label style="margin-bottom:10px">Edita aquí directamente el código de mejoras y banderas especiales.</label>
            <textarea id="json-editor" onchange="updateJson()">${JSON.stringify(item, null, 2)}</textarea>
        </div>
    `;

    container.innerHTML = `
        <h2 style="color:var(--accent); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">
            EDITANDO: ${item.name || selectedKey} 
            <span style="font-size:0.6em; color:#666; margin-left:10px; font-weight:normal">ID: ${selectedKey}</span>
        </h2>
        ${hint}
        ${fields}
    `;
}

window.updateField = function(key, val, type) {
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    if(type === 'number') val = parseFloat(val);
    data[selectedKey][key] = val;
    const jsonEditor = document.getElementById('json-editor');
    if(jsonEditor) jsonEditor.value = JSON.stringify(data[selectedKey], null, 2);
    renderList();
};

window.updateJson = function() {
    const data = currentTab === 'towers' ? TOWERS : ENEMIES;
    const val = document.getElementById('json-editor').value;
    try {
        const parsed = JSON.parse(val);
        data[selectedKey] = parsed;
        renderList();
        renderEditor(); 
    } catch(e) {
        alert("JSON Inválido: " + e.message);
    }
};

window.addNewItem = function() {
    const id = prompt("ID único para el nuevo elemento (ej: super_tower):");
    if(!id) return;
    const safeId = id.replace(/[^a-zA-Z0-9_]/g, '').toLowerCase();
    
    if(currentTab === 'towers') {
        if(TOWERS[safeId]) return alert("Ya existe.");
        TOWERS[safeId] = { name: "Nueva Torre", type: "cannon", color: "#ffffff", cost: 100, dmg: 10, range: 3, rate: 1, upgrades: [] };
    } else {
        if(ENEMIES[safeId]) return alert("Ya existe.");
        ENEMIES[safeId] = { hp: 100, speed: 1, money: 10, color: "#ff0000", radius: 10, immune: false };
    }
    selectItem(safeId);
};

window.deleteItem = function() {
    if(!selectedKey) return;
    if(!confirm(`¿Estás seguro de borrar ${selectedKey}?`)) return;
    if(currentTab === 'towers') delete TOWERS[selectedKey];
    else delete ENEMIES[selectedKey];
    selectedKey = null;
    renderList();
    document.getElementById('editor-content').innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#555; text-align:center;">
            <div style="font-size:4rem; margin-bottom:20px;">🗑️</div>
            <div>Elemento eliminado.</div>
        </div>
    `;
};

window.saveToCloud = function() {
    const creator = document.getElementById('creator-name').value;
    const exportData = {
        towers: TOWERS,
        enemies: ENEMIES,
        name: creator
    };
    window.CloudManager.save(exportData, `${creator}'s Mode ${new Date().toLocaleTimeString()}`);
};

// Carga en el editor para modificar
window.loadFromCloud = function(id, escapedJson) {
    try {
        const data = JSON.parse(unescape(escapedJson));
        if(data.towers) TOWERS = data.towers;
        if(data.enemies) ENEMIES = data.enemies;
        if(data.name) document.getElementById('creator-name').value = data.name;
        
        switchTab('towers'); // Volver a la pestaña de edición
        alert("¡Datos cargados en el editor!");
    } catch(e) {
        console.error(e);
        alert("Error al cargar datos.");
    }
}

// UI Modal
window.openModal = (id) => document.getElementById(id).style.display = 'flex';
window.closeModal = (id) => document.getElementById(id).style.display = 'none';
window.showAuthError = (msg) => document.getElementById('auth-error-msg').innerText = msg;
window.submitAuth = (mode) => {
    const u = document.getElementById('auth-user').value;
    const p = document.getElementById('auth-pass').value;
    if(!u || !p) return showAuthError("Rellena todo.");
    if(mode === 'login') window.AuthManager.login(u,p);
    else window.AuthManager.register(u,p);
};

// Start
renderList();

</script>
</body>
</html>

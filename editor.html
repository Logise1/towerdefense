<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Defense - Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'towerdefense-public-v1';

        // --- GLOBAL STATE ---
        window.AppState = {
            user: null,
            currentDocId: null,
            creations: []
        };

        // --- AUTH MANAGER ---
        window.AuthManager = {
            login: async (emailRaw, password) => {
                const email = emailRaw.includes('@') ? emailRaw : `${emailRaw}@email.com`;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (error) { 
                    console.error(error);
                    alert("Error: " + error.message); 
                }
            },
            register: async (emailRaw, password) => {
                const email = emailRaw.includes('@') ? emailRaw : `${emailRaw}@email.com`;
                try {
                    await createUserWithEmailAndPassword(auth, email, password);
                } catch (error) { 
                    console.error(error);
                    alert("Error: " + error.message); 
                }
            },
            logout: async () => {
                 await signOut(auth);
                 window.UI.showScreen('login-screen');
            }
        };

        // --- CLOUD MANAGER ---
        window.CloudManager = {
            listCreations: async () => {
                if (!auth.currentUser) return;
                window.UI.setLoading(true);
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'custom_modes');
                    const snapshot = await getDocs(colRef);
                    const list = [];
                    snapshot.forEach(doc => {
                        const d = doc.data();
                        if(d.authorUid === auth.currentUser.uid) {
                            list.push({id: doc.id, ...d});
                        }
                    });
                    list.sort((a,b) => b.timestamp - a.timestamp);
                    window.AppState.creations = list;
                    window.UI.renderDashboard(list);
                } catch (e) {
                    console.error(e);
                } finally {
                    window.UI.setLoading(false);
                }
            },
            saveCurrent: async () => {
                if (!auth.currentUser) return;
                const btn = document.getElementById('save-btn');
                btn.innerText = "GUARDANDO...";
                btn.disabled = true;

                const name = document.getElementById('creation-name-input').value || "Sin Nombre";
                const userEmail = auth.currentUser.email || "anonimo@studio.com";
                const authorName = userEmail.split('@')[0];

                const dataToSave = {
                    name: name,
                    author: authorName,
                    authorUid: auth.currentUser.uid,
                    data: JSON.stringify({towers: window.TOWERS, enemies: window.ENEMIES, name: name}),
                    timestamp: Date.now()
                };

                try {
                    if (window.AppState.currentDocId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'custom_modes', window.AppState.currentDocId), dataToSave);
                    } else {
                        const ref = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'custom_modes'), dataToSave);
                        window.AppState.currentDocId = ref.id;
                    }
                    btn.innerText = "GUARDADO ✔";
                    setTimeout(() => { btn.innerText = "GUARDAR CAMBIOS"; btn.disabled = false; }, 2000);
                } catch (e) {
                    console.error(e);
                    btn.innerText = "ERROR X";
                    btn.disabled = false;
                }
            }
        };

        // --- UI MANAGER ---
        window.UI = {
            showScreen: (id) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },
            setLoading: (show) => {
                document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
            },
            renderDashboard: (list) => {
                const grid = document.getElementById('creations-grid');
                grid.innerHTML = '';
                
                const newCard = document.createElement('div');
                newCard.className = 'card new-card';
                newCard.innerHTML = `<div>+</div><span>NUEVO PROYECTO</span>`;
                newCard.onclick = () => window.Editor.initNew();
                grid.appendChild(newCard);

                list.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-title">${item.name}</div>
                        <div class="card-meta">Editado: ${new Date(item.timestamp).toLocaleDateString()}</div>
                        <div class="card-actions">
                            <button class="btn-small btn-edit">EDITAR</button>
                        </div>
                    `;
                    card.querySelector('.btn-edit').onclick = (e) => { e.stopPropagation(); window.Editor.load(item.id, item.data); };
                    grid.appendChild(card);
                });
            }
        };

        // --- EDITOR LOGIC ---
        window.Editor = {
            initNew: () => {
                window.AppState.currentDocId = null;
                window.TOWERS = JSON.parse(JSON.stringify(window.DEFAULT_TOWERS));
                window.ENEMIES = JSON.parse(JSON.stringify(window.DEFAULT_ENEMIES));
                document.getElementById('creation-name-input').value = "Mi Gran Nivel";
                window.renderList();
                window.UI.showScreen('editor-screen');
                document.getElementById('editor-content').innerHTML = '<div style="text-align:center;margin-top:100px;color:#666">Selecciona un elemento para empezar</div>';
            },
            load: (id, jsonString) => {
                window.AppState.currentDocId = id;
                try {
                    const parsed = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;
                    if(parsed.towers) window.TOWERS = parsed.towers;
                    if(parsed.enemies) window.ENEMIES = parsed.enemies;
                    document.getElementById('creation-name-input').value = parsed.name || "Sin Nombre";
                    window.renderList();
                    window.UI.showScreen('editor-screen');
                    document.getElementById('editor-content').innerHTML = '<div style="text-align:center;margin-top:100px;color:#666">Cargado. Selecciona un elemento.</div>';
                } catch(e) {
                    console.error(e);
                    alert("Error al cargar datos.");
                }
            }
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.AppState.user = user;
            if (user) {
                const displayEmail = user.email || "PILOTO@NEON.COM";
                document.getElementById('user-display-name').innerText = displayEmail.split('@')[0].toUpperCase();
                window.UI.showScreen('dashboard-screen');
                window.CloudManager.listCreations();
            } else {
                window.UI.showScreen('login-screen');
            }
        });

        window.onload = initAuth;
    </script>

    <style>
        :root {
            --bg: #0a0a12;
            --panel: #141423;
            --accent: #00ffcc;
            --text: #e0e6ed;
            --border: #2a2a40;
            --danger: #ff2a6d;
            --gold: #ffd700;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: var(--bg); }
        .screen.active { display: flex; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; color: var(--accent); font-size: 2rem; }
        #login-screen { justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%); }
        .login-box { background: var(--panel); padding: 40px; border: 1px solid var(--accent); border-radius: 10px; width: 350px; box-shadow: 0 0 30px rgba(0,255,204,0.1); }
        .login-title { text-align: center; color: var(--accent); font-size: 2rem; margin-bottom: 20px; font-weight: 800; text-shadow: 0 0 10px var(--accent); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; font-family: inherit; border-radius: 4px; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 1rem; margin-bottom: 10px; border-radius: 4px; }
        .btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 15px rgba(0,255,204,0.4); }
        .btn-outline { background: transparent; border: 1px solid #444; color: #888; }
        #dashboard-screen { flex-direction: column; }
        .nav-bar { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; justify-content: space-between; background: var(--panel); }
        .nav-title { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .dashboard-content { flex: 1; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: 0.2s; display: flex; flex-direction: column; height: 160px; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .new-card { border-style: dashed; justify-content: center; align-items: center; cursor: pointer; color: #666; }
        .new-card:hover { color: var(--accent); border-color: var(--accent); }
        .card-title { font-size: 1.2rem; font-weight: bold; color: white; margin-bottom: 5px; }
        .card-meta { font-size: 0.8rem; color: #666; margin-bottom: auto; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-small { flex: 1; padding: 8px; font-size: 0.8rem; cursor: pointer; border: 1px solid #444; background: #222; color: #ccc; border-radius: 4px; font-family: inherit; font-weight: bold; }
        .editor-layout { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; color: #666; cursor: pointer; font-family: inherit; font-weight: bold; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .item-list { flex: 1; overflow-y: auto; padding: 10px; }
        .list-item { padding: 10px; margin-bottom: 5px; background: rgba(255,255,255,0.03); cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; border: 1px solid transparent; }
        .list-item.active { border-color: var(--accent); background: rgba(0,255,204,0.1); color: white; }
        .editor-main { flex: 1; padding: 30px; overflow-y: auto; background: #0f0f18; display: flex; flex-direction: column; }
        .form-group { margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .form-label { display: block; color: var(--accent); margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        textarea { width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; border: 1px solid #444; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="loading-overlay">CARGANDO...</div>

<div id="login-screen" class="screen active">
    <div class="login-box">
        <div class="login-title">NEON STUDIO</div>
        <input type="text" id="login-email" placeholder="Usuario o Email">
        <input type="password" id="login-pass" placeholder="Contraseña">
        <button class="btn" onclick="window.AuthManager.login(document.getElementById('login-email').value, document.getElementById('login-pass').value)">ENTRAR</button>
        <button class="btn btn-outline" onclick="window.AuthManager.register(document.getElementById('login-email').value, document.getElementById('login-pass').value)">CREAR CUENTA</button>
    </div>
</div>

<div id="dashboard-screen" class="screen">
    <div class="nav-bar">
        <div class="nav-title">PROYECTOS</div>
        <div class="user-info">
            <span id="user-display-name" style="color:white; font-weight:bold">USER</span>
            <button class="btn-small" onclick="window.AuthManager.logout()">SALIR</button>
        </div>
    </div>
    <div class="dashboard-content">
        <div class="grid" id="creations-grid"></div>
    </div>
</div>

<div id="editor-screen" class="screen">
    <div class="editor-layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <button onclick="window.UI.showScreen('dashboard-screen')" style="background:none; border:none; color:#666; cursor:pointer; font-size:1.5rem">←</button>
                <input type="text" id="creation-name-input" style="margin:0; background:transparent; border:none; color:white; font-weight:bold">
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('towers', event)">TORRES</button>
                <button class="tab-btn" onclick="switchTab('enemies', event)">ENEMIGOS</button>
            </div>
            <div id="item-list" class="item-list"></div>
            <div style="padding:10px; border-top:1px solid var(--border)">
                <button class="btn-small" style="width:100%" onclick="addNewItem()">+ AÑADIR NUEVO</button>
            </div>
        </div>
        <div class="editor-main">
            <div id="editor-content"></div>
            <div style="margin-top:auto; padding-top:20px; display:flex; justify-content:flex-end;">
                <button class="btn" style="width:auto; padding:10px 40px;" id="save-btn" onclick="window.CloudManager.saveCurrent()">GUARDAR ARSENAL</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- ARSENAL COMPLETO ACTUALIZADO ---
const TILE = 40;
window.DEFAULT_TOWERS = {
  cannon: { name: "Blaster", symbol: "💥", type: "cannon", color: "#ff9100", cost: 60, dmg: 12, range: 120, rate: 45, radius: 10, upgrades: [] },
  bow: { name: "Rápido", symbol: "🏹", type: "bow", color: "#00e676", cost: 110, dmg: 7, range: 160, rate: 22, critChance: 0.15, critMult: 2, radius: 9, upgrades: [] },
  ice: { name: "Cryo", symbol: "❄️", type: "ice", color: "#00b0ff", cost: 100, dmg: 6, range: 120, rate: 45, slow: 0.5, slowDur: 140, radius: 10, upgrades: [] },
  mortar: { name: "Artillería", symbol: "💣", type: "mortar", color: "#ff5252", cost: 190, dmg: 30, range: 200, rate: 85, splash: 88, radius: 12, upgrades: [] },
  electro: { name: "Tesla", symbol: "⚡", type: "electro", color: "#ffff00", cost: 200, dmg: 12, range: 140, rate: 40, chain: 3, radius: 10, upgrades: [] },
  laser: { name: "Láser", symbol: "🧿", type: "laser", color: "#d500f9", cost: 160, dmg: 4, range: 160, rate: 4, radius: 9, upgrades: [] },
  sniper: { name: "Railgun", symbol: "🔭", type: "sniper", color: "#cfd8dc", cost: 480, dmg: 260, range: 360, rate: 150, radius: 8, upgrades: [] },
  sonic: { name: "Sonic", symbol: "🔊", type: "sonic", color: "#00e5ff", cost: 520, dmg: 25, range: 120, rate: 28, splash: 112, slow: 0.35, slowDur: 45, radius: 12, upgrades: [] },
  plasma: { name: "Inferno", symbol: "☀️", type: "plasma", color: "#ff6d00", cost: 320, dmg: 9, range: 140, rate: 5, splash: 72, radius: 11, upgrades: [] },
  gamma: { name: "Gamma", symbol: "☢️", type: "gamma", color: "#76ff03", cost: 1500, dmg: 90, range: 200, rate: 10, radius: 12, upgrades: [] },
  vortex: { name: "Vortex", symbol: "🌀", type: "vortex", color: "#651fff", cost: 2400, dmg: 260, range: 160, rate: 40, splash: 140, slow: 0.25, radius: 13, upgrades: [] },
  titan: { name: "Titan", symbol: "👑", type: "titan", color: "#ffd600", cost: 3200, dmg: 420, range: 240, rate: 130, splash: 92, critChance: 0.2, critMult: 2.2, radius: 14, upgrades: [] },
  omega: { name: "Omega", symbol: "♾️", type: "omega", color: "#ffffff", cost: 30000, dmg: 3500, range: 400, rate: 100, splash: 120, ignoreArmor: true, radius: 18, upgrades: [] }
};

window.DEFAULT_ENEMIES = {
  basic: { hp: 14, speed: 1.5, money: 5, color: "#e0e0e0", radius: 10, immune: false, glow: "rgba(255,255,255,0.4)" },
  fast: { hp: 12, speed: 3.2, money: 7, color: "#ffea00", radius: 8, immune: false, glow: "rgba(255,234,0,0.5)" },
  tank: { hp: 90, speed: 0.8, money: 25, color: "#ff3d00", radius: 14, immune: false, glow: "rgba(255,61,0,0.6)" },
  special: { hp: 30, speed: 1.6, money: 14, color: "#d500f9", radius: 11, immune: true, glow: "rgba(213,0,249,0.6)" },
  boss: { hp: 450, speed: 0.55, money: 300, color: "#b71c1c", radius: 22, immune: false, glow: "rgba(183,28,28,0.8)" },
  white_guard: { hp: 2500, speed: 0.6, money: 150, color: "#ffffff", radius: 16, immune: false, glow: "rgba(255,255,255,0.9)" },
  white_boss: { hp: 3000, speed: 0.45, money: 1200, color: "#ffffff", radius: 25, immune: true, glow: "rgba(255,255,255,1)" },
  mecha_hydra: { hp: 4500, speed: 0.4, money: 2500, color: "#00ff00", radius: 28, immune: false, glow: "rgba(0,255,0,0.8)" },
  cyber_angel: { hp: 4200, speed: 1.1, money: 3000, color: "#00ccff", radius: 20, immune: true, glow: "rgba(0,200,255,1)" },
  galactic_devourer: { hp: 9000, speed: 0.3, money: 4000, color: "#ff00ff", radius: 30, immune: true, glow: "rgba(255,0,255,0.85)" },
  void_boss: { hp: 14000, speed: 0.35, money: 6000, color: "#311b92", radius: 28, immune: true, glow: "rgba(100,0,255,1)" },
  chaos_lord: { hp: 40000, speed: 0.3, money: 20000, color: "#000000", radius: 35, immune: true, glow: "rgba(255,0,0,1)" },
  neon_god: { hp: 80000, speed: 0.25, money: 60000, color: "#ffd700", radius: 32, immune: true, glow: "rgba(255,215,0,1)" },
  entity_zero: { hp: 350000, speed: 0.2, money: 1000000, color: "#ffffff", radius: 40, immune: true, glow: "rgba(255,255,255,1)" }
};

window.TOWERS = {};
window.ENEMIES = {};
let currentTab = 'towers';
let selectedKey = null;

window.switchTab = function(tab, event) {
    currentTab = tab;
    selectedKey = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if(event) event.target.classList.add('active');
    window.renderList();
    document.getElementById('editor-content').innerHTML = '';
}

window.renderList = function() {
    const list = document.getElementById('item-list');
    list.innerHTML = '';
    const data = currentTab === 'towers' ? window.TOWERS : window.ENEMIES;
    Object.keys(data).forEach(key => {
        const item = data[key];
        const el = document.createElement('div');
        el.className = `list-item ${selectedKey === key ? 'active' : ''}`;
        el.innerHTML = `<span>${item.name || key}</span> <span style="font-size:0.7em; color:var(--accent)">${key}</span>`;
        el.onclick = () => selectItem(key);
        list.appendChild(el);
    });
}

function selectItem(key) {
    selectedKey = key;
    window.renderList();
    renderEditorForm();
}

function renderEditorForm() {
    if(!selectedKey) return;
    const data = currentTab === 'towers' ? window.TOWERS : window.ENEMIES;
    const item = data[selectedKey];
    const container = document.getElementById('editor-content');
    
    let html = `
        <h2 style="color:var(--accent); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">
            ${item.name || selectedKey} <span style="font-size:0.5em;color:#666">(${selectedKey})</span>
        </h2>
        <div class="form-group">
            <label class="form-label">Edición Rápida</label>
            <div class="form-row">
                <div>
                    <label style="font-size:0.8em; color:#888">NOMBRE</label>
                    <input type="text" value="${item.name || ''}" onchange="updateField('name', this.value)">
                </div>
                <div>
                    <label style="font-size:0.8em; color:#888">COLOR</label>
                    <input type="color" value="${item.color}" onchange="updateField('color', this.value)">
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Estructura de Datos (JSON)</label>
            <textarea id="json-editor" onchange="updateJson()">${JSON.stringify(item, null, 2)}</textarea>
            <p style="font-size:0.8rem; color:#666; margin-top:10px">Modifica los valores numéricos directamente en el JSON para ajustes precisos.</p>
        </div>
    `;
    container.innerHTML = html;
}

window.updateField = function(key, val) {
    const data = currentTab === 'towers' ? window.TOWERS : window.ENEMIES;
    data[selectedKey][key] = val;
    document.getElementById('json-editor').value = JSON.stringify(data[selectedKey], null, 2);
    window.renderList();
}

window.updateJson = function() {
    const data = currentTab === 'towers' ? window.TOWERS : window.ENEMIES;
    try {
        const val = JSON.parse(document.getElementById('json-editor').value);
        data[selectedKey] = val;
        window.renderList();
    } catch(e) { console.error("JSON Error"); }
}

window.addNewItem = function() {
    const id = prompt("ID único:");
    if(!id) return;
    const cleanId = id.replace(/[^a-z0-9_]/gi, '').toLowerCase();
    if(currentTab === 'towers') window.TOWERS[cleanId] = { name: "Nueva Torre", cost: 100, dmg: 10, range: 120, rate: 30, color: "#ffffff" };
    else window.ENEMIES[cleanId] = { name: "Nuevo Enemigo", hp: 100, speed: 1, money: 10, color: "#ff0000" };
    selectItem(cleanId);
}
</script>
</body>
</html>

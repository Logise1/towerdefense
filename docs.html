<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Zombie - Base de Datos Táctica v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a12;
            --panel-bg: #141423;
            --accent: #00ffcc;
            --gold: #ffcc00;
            --danger: #ff2a6d;
            --text-main: #e0e6ed;
            --text-muted: #8899ac;
            --border: #2a2a40;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* SIDEBAR */
        nav {
            width: 280px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .nav-header {
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 800;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            letter-spacing: 2px;
        }

        .tab-container {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: none;
            color: var(--text-muted);
            padding: 15px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .tab-btn.active {
            background: var(--panel-bg);
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .list-container {
            padding: 10px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 10px 15px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active {
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tower-dot {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px currentColor;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }

        .card {
            background: rgba(20, 20, 35, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 950px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        .header-row {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .preview-container {
            position: relative;
        }

        .preview-canvas {
            width: 150px;
            height: 150px;
            background: #050505;
            border: 2px solid var(--border);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5) inset;
        }
        
        .title-block { flex: 1; }
        .title-block h1 { margin: 0; font-size: 3rem; text-transform: uppercase; color: white; line-height: 1; }
        .title-block .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-top: 10px; line-height: 1.4; }
        .cost-badge { 
            background: var(--gold); color: black; padding: 5px 12px; 
            border-radius: 4px; font-weight: 800; font-size: 1.1rem; 
            display: inline-block; margin-top: 15px;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }
        .hp-badge {
            background: var(--danger); color: white; padding: 5px 12px;
            border-radius: 4px; font-weight: 800; font-size: 1.1rem;
            display: inline-block; margin-top: 15px;
            box-shadow: 0 0 10px rgba(255, 42, 109, 0.3);
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-box.updated {
            border-color: var(--accent);
            transform: scale(1.05);
            background: rgba(0, 255, 204, 0.05);
        }
        .stat-val { font-size: 2rem; font-weight: 800; display: block; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stat-label { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; font-weight: 700; }

        /* UPGRADES LIST */
        h2 { color: var(--accent); border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px; font-size: 1.5rem; }

        .upgrade-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .upgrade-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .upgrade-item:hover { border-color: #666; background: rgba(255,255,255,0.05); transform: translateX(5px); }
        
        .upgrade-item.active {
            border-color: var(--accent);
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        .upgrade-item.active::before {
            content: 'VISTA ACTUAL';
            position: absolute;
            right: 10px; top: 5px;
            font-size: 0.6rem; color: var(--accent); opacity: 0.7;
        }

        .upg-lvl { color: var(--gold); font-weight: 800; width: 80px; font-size: 1.1rem; }
        .upg-desc { flex: 1; color: white; font-size: 1rem; }
        .upg-cost { color: var(--text-muted); font-weight: bold; font-family: monospace; font-size: 1.1rem; }
        
        .ultimate {
            border-color: rgba(255, 42, 109, 0.3);
            background: linear-gradient(90deg, rgba(255, 42, 109, 0.05), transparent);
        }
        .ultimate:hover { border-color: var(--danger); }
        .ultimate.active { border-color: var(--danger); background: rgba(255, 42, 109, 0.1); }
        .ultimate .upg-lvl { color: var(--danger); }

        .base-btn {
            text-align: center; margin-bottom: 10px; padding: 10px; 
            border: 1px solid #444; border-radius: 6px; cursor: pointer; color: #888; font-weight: bold;
            background: rgba(0,0,0,0.2); transition: 0.2s;
        }
        .base-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .base-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 204, 0.05); }

        .immune-tag {
            background: rgba(255,255,255,0.1); border: 1px solid #fff;
            padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-left: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>

// --- LOGICA DE UI ---
let currentTab = 'towers';
let currentSimLoop = null;

const listContainer = document.getElementById('list-container');
const mainContent = document.getElementById('main-content');

// Initial Render
switchTab('towers');

function switchTab(tab) {
    currentTab = tab;
    // Update Buttons
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    
    // Clear list
    listContainer.innerHTML = '';
    
    if (tab === 'towers') {
        Object.keys(BASIC_TOWERS).forEach(key => {
            const t = BASIC_TOWERS[key];
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerHTML = `<span class="tower-dot" style="background:${t.color}"></span> ${t.name}`;
            btn.onclick = () => loadTower(key, btn);
            listContainer.appendChild(btn);
        });
        // Load first item
        loadTower('cannon', listContainer.children[0]);
    } else {
        Object.keys(ENEMY_DATA).forEach(key => {
            const e = ENEMY_DATA[key];
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            // Use radius as a visual indicator size for dot
            btn.innerHTML = `<span class="tower-dot" style="background:${e.color}; box-shadow: 0 0 5px ${e.glow}"></span> ${e.name || key}`;
            btn.onclick = () => loadEnemy(key, btn);
            listContainer.appendChild(btn);
        });
        loadEnemy('basic', listContainer.children[0]);
    }
}

function loadTower(key, btnElement) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if(btnElement) btnElement.classList.add('active');
    renderTowerView(key, 0); 
}

function loadEnemy(key, btnElement) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if(btnElement) btnElement.classList.add('active');
    renderEnemyView(key);
}

// --- RENDERIZADO DE TORRES ---
function renderTowerView(key, activeLevel) {
    const t = BASIC_TOWERS[key];
    
    // Deep clone basic properties for calculation
    let tempTower = { dmg: t.dmg, rate: t.rate, range: t.range };
    
    // Apply upgrades up to current level
    for(let i=0; i<activeLevel; i++) {
        if(t.upgrades[i]) t.upgrades[i].apply(tempTower);
    }

    const shotsPerSec = 60 / tempTower.rate;
    const dps = (tempTower.dmg * shotsPerSec).toFixed(1);

    const html = `
        <div class="card">
            <div class="header-row">
                <div class="preview-container">
                    <canvas id="preview-canvas" class="preview-canvas" width="150" height="150"></canvas>
                </div>
                <div class="title-block">
                    <h1 style="color:${t.color}">${t.name}</h1>
                    <div class="subtitle">${t.desc}</div>
                    <div class="cost-badge">COSTE: $${t.cost}</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#ff5252">${tempTower.dmg.toFixed(0)}</span>
                    <span class="stat-label">Daño</span>
                </div>
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#448aff">${shotsPerSec.toFixed(2)}/s</span>
                    <span class="stat-label">Velocidad</span>
                </div>
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#69f0ae">${(tempTower.range/TILE).toFixed(1)}</span>
                    <span class="stat-label">Rango (Tiles)</span>
                </div>
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#ffd740">${dps}</span>
                    <span class="stat-label">DPS Est.</span>
                </div>
            </div>

            <h2>ÁRBOL DE MEJORAS</h2>
            <div class="base-btn ${activeLevel === 0 ? 'active' : ''}" onclick="renderTowerView('${key}', 0)">
                NIVEL 1: BASE (RESETEAR VISTA)
            </div>
            <div class="upgrade-list">
                ${t.upgrades.map((upg, i) => `
                    <div class="upgrade-item ${i===3 ? 'ultimate' : ''} ${activeLevel === i+1 ? 'active' : ''}" 
                         onclick="renderTowerView('${key}', ${i+1})">
                        <div class="upg-lvl">NIVEL ${i+2}</div>
                        <div class="upg-desc">${upg.text}</div>
                        <div class="upg-cost">$${upg.cost}</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;

    mainContent.innerHTML = html;
    startPreview('preview-canvas', {type: 'tower', key: key, level: activeLevel});
}

// --- RENDERIZADO DE ENEMIGOS ---
function renderEnemyView(key) {
    const e = ENEMY_DATA[key];
    const name = e.name || key.toUpperCase();

    const html = `
        <div class="card" style="border-color: ${e.color}">
            <div class="header-row">
                <div class="preview-container">
                    <canvas id="preview-canvas" class="preview-canvas" width="150" height="150"></canvas>
                </div>
                <div class="title-block">
                    <h1 style="color:${e.color}; text-shadow: 0 0 10px ${e.glow}">${name}</h1>
                    <div class="subtitle">Amenaza Detectada</div>
                    <div class="hp-badge">HP: ${e.hp.toLocaleString()}</div>
                    ${e.immune ? '<span class="immune-tag">INMUNE A EFECTOS</span>' : ''}
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-val" style="color:#448aff">${e.speed}</span>
                    <span class="stat-label">Velocidad</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" style="color:#ffd700">$${e.money.toLocaleString()}</span>
                    <span class="stat-label">Recompensa</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" style="color:#e0e0e0">${e.radius}px</span>
                    <span class="stat-label">Tamaño</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" style="color:${e.immune ? '#ff2a6d' : '#00e676'}">${e.immune ? 'SI' : 'NO'}</span>
                    <span class="stat-label">Inmunidad</span>
                </div>
            </div>
            
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:8px; border:1px solid #333;">
                <h3 style="margin-top:0; color:#888;">ANÁLISIS DE COMBATE</h3>
                <p style="color:#ddd;">
                    ${generateEnemyDesc(e, key)}
                </p>
            </div>
        </div>
    `;

    mainContent.innerHTML = html;
    startPreview('preview-canvas', {type: 'enemy', key: key});
}

function generateEnemyDesc(e, key) {
    if(e.hp > 100000) return "Entidad de nivel apocalíptico. Se requiere potencia de fuego extrema o daño porcentual. Evitar combate cercano.";
    if(e.immune) return "Esta unidad posee blindaje contra efectos de estado. Las torres de hielo o veneno son inefectivas. Usar daño bruto o artillería.";
    if(e.speed > 2.5) return "Unidad de alta velocidad. Se recomiendan torres de tiro rápido (Minigun, Laser) o ralentización (Ice).";
    if(e.hp > 1000) return "Blindaje pesado detectado. Unidades de tipo Sniper, Plasma o Titan son recomendadas.";
    return "Unidad estándar. Cualquier defensa básica debería ser suficiente.";
}

// --- VISUALIZACIÓN EN CANVAS ---
function startPreview(canvasId, options) {
    const canvas = document.getElementById(canvasId);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    
    if(currentSimLoop) cancelAnimationFrame(currentSimLoop);

    function loop() {
        // Clear
        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
        const time = Date.now() * 0.002;
        
        ctx.save();
        ctx.translate(w/2, h/2);

        if (options.type === 'tower') {
            const t = BASIC_TOWERS[options.key];
            const angle = Math.sin(time) * 0.5 - Math.PI/2;
            
            // Draw Range Circle (Subtle)
            ctx.beginPath(); ctx.arc(0,0,40,0,Math.PI*2); 
            ctx.strokeStyle = '#222'; ctx.stroke();

            // Draw Tower
            ctx.rotate(angle);
            ctx.shadowBlur = 15; ctx.shadowColor = t.color;
            ctx.fillStyle = t.color;
            ctx.strokeStyle = t.color;

            // Simple Shapes based on type logic (simplified from previous)
            ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
            
            // Barrel/Weapon
            ctx.fillStyle = '#fff';
            if(['cannon','mortar','bio','gamma','plasma'].includes(options.key)) {
                ctx.fillRect(0,-4, 20, 8);
            } else if(['bow','sniper'].includes(options.key)) {
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(20, -5); ctx.lineTo(20, 5); ctx.fill();
            } else if(['minigun','neutron'].includes(options.key)) {
                 ctx.fillRect(0,-6, 18, 4); ctx.fillRect(0,2, 18, 4);
            } else {
                ctx.beginPath(); ctx.arc(8,0, 6, 0, Math.PI*2); ctx.fill();
            }

            // Level indicators
            ctx.rotate(-angle); // Reset rotation for dots
            for(let i=0; i<options.level; i++) {
                ctx.fillStyle = i===3 ? '#ff2a6d' : t.color;
                ctx.beginPath(); ctx.arc(-20 + i*10, 30, 3, 0, Math.PI*2); ctx.fill();
            }

        } else if (options.type === 'enemy') {
            const e = ENEMY_DATA[options.key];
            const float = Math.sin(time*2) * 5;
            
            // Glow
            const glowSize = 10 + Math.sin(time*5)*5;
            const gradient = ctx.createRadialGradient(0,0, e.radius, 0,0, e.radius + glowSize);
            gradient.addColorStop(0, e.glow);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath(); ctx.arc(0,0, e.radius + glowSize, 0, Math.PI*2); ctx.fill();

            // Body
            ctx.fillStyle = e.color;
            ctx.shadowBlur = 20; ctx.shadowColor = e.glow;
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI*2); ctx.fill();
            
            // "Eyes" or details
            ctx.fillStyle = e.white ? '#000' : '#fff';
            ctx.beginPath(); ctx.arc(e.radius*0.3, -e.radius*0.3, e.radius*0.2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.radius*0.3, e.radius*0.3, e.radius*0.2, 0, Math.PI*2); ctx.fill();
        }

        ctx.restore();
        currentSimLoop = requestAnimationFrame(loop);
    }
    loop();
}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Zombie - Base de Datos Táctica</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a12;
            --panel-bg: #141423;
            --accent: #00ffcc;
            --gold: #ffcc00;
            --danger: #ff2a6d;
            --text-main: #e0e6ed;
            --text-muted: #8899ac;
            --border: #2a2a40;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* SIDEBAR */
        nav {
            width: 260px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
        }

        .nav-header {
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active {
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tower-dot {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px currentColor;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }

        .card {
            background: rgba(20, 20, 35, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            max-width: 950px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        .header-row {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .preview-container {
            position: relative;
        }

        .preview-canvas {
            width: 150px;
            height: 150px;
            background: #050505;
            border: 2px solid var(--border);
            border-radius: 50%; /* Circular preview */
            box-shadow: 0 0 20px rgba(0,0,0,0.5) inset;
        }
        
        .title-block { flex: 1; }
        .title-block h1 { margin: 0; font-size: 3rem; text-transform: uppercase; color: white; line-height: 1; }
        .title-block .subtitle { color: var(--text-muted); font-size: 1.1rem; margin-top: 10px; line-height: 1.4; }
        .cost-badge { 
            background: var(--gold); color: black; padding: 5px 12px; 
            border-radius: 4px; font-weight: 800; font-size: 1.1rem; 
            display: inline-block; margin-top: 15px;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-box.updated {
            border-color: var(--accent);
            transform: scale(1.05);
            background: rgba(0, 255, 204, 0.05);
        }
        .stat-val { font-size: 2rem; font-weight: 800; display: block; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stat-label { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; font-weight: 700; }

        /* UPGRADES LIST */
        h2 { color: var(--accent); border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 20px; font-size: 1.5rem; }

        .upgrade-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .upgrade-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .upgrade-item:hover { border-color: #666; background: rgba(255,255,255,0.05); transform: translateX(5px); }
        
        .upgrade-item.active {
            border-color: var(--accent);
            background: rgba(0, 255, 204, 0.05);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        .upgrade-item.active::before {
            content: 'VISTA ACTUAL';
            position: absolute;
            right: 10px; top: 5px;
            font-size: 0.6rem; color: var(--accent); opacity: 0.7;
        }

        .upg-lvl { color: var(--gold); font-weight: 800; width: 80px; font-size: 1.1rem; }
        .upg-desc { flex: 1; color: white; font-size: 1rem; }
        .upg-cost { color: var(--text-muted); font-weight: bold; font-family: monospace; font-size: 1.1rem; }
        
        .ultimate {
            border-color: rgba(255, 42, 109, 0.3);
            background: linear-gradient(90deg, rgba(255, 42, 109, 0.05), transparent);
        }
        .ultimate:hover { border-color: var(--danger); }
        .ultimate.active { border-color: var(--danger); background: rgba(255, 42, 109, 0.1); }
        .ultimate .upg-lvl { color: var(--danger); }

        .base-btn {
            text-align: center; margin-bottom: 10px; padding: 10px; 
            border: 1px solid #444; border-radius: 6px; cursor: pointer; color: #888; font-weight: bold;
            background: rgba(0,0,0,0.2); transition: 0.2s;
        }
        .base-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .base-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 204, 0.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

    </style>
</head>
<body>

<nav id="nav-list">
    <div class="nav-header">ARSENAL v3.8</div>
    <!-- Buttons generated by JS -->
</nav>

<main id="main-content">
    <div style="text-align: center; margin-top: 200px; color: #666;">
        <h2>SISTEMA INICIADO</h2>
        <p>Seleccione una unidad para análisis táctico.</p>
    </div>
</main>

<script>
const TILE = 20; // Escala reducida para stats visuales
const PALETTE = {
    cannon: '#ff9100', bow: '#00e676', mortar: '#f50057', ice: '#00b0ff', 
    electro: '#d500f9', laser: '#ff00cc', sniper: '#76ff03', 
    minigun: '#2979ff', plasma: '#ff3d00', titan: '#ffd700'
};

// --- DATOS COMPLETOS ---
const TOWER_DATA = {
    cannon: { 
        name: "Blaster", symbol: "💥", type: "cannon", color: PALETTE.cannon, 
        cost: 60, dmg: 12, range: 60, rate: 45, 
        desc: "Daño directo básico. Eficiente y fiable para el inicio.", 
        upgrades: [
            {cost:40, text:"+5 Daño", apply:(t)=>t.dmg+=5},
            {cost:60, text:"+10 Daño", apply:(t)=>t.dmg+=10},
            {cost:80, text:"+1 Rango y +10 Daño", apply:(t)=>{t.dmg+=10; t.range+=20}},
            {cost:250, text:"ULTIMATE: Explosivo", apply:(t)=>{t.splash=40;}} 
        ] 
    },
    bow: { 
        name: "Rápido", symbol: "🏹", type: "bow", color: PALETTE.bow, 
        cost: 120, dmg: 6, range: 80, rate: 20, 
        desc: "Velocidad extrema. Probabilidad de impacto crítico.", 
        upgrades: [
            {cost:80, text:"+20% Velocidad", apply:(t)=>t.rate=Math.floor(t.rate*0.8)},
            {cost:100, text:"+2 Daño", apply:(t)=>t.dmg+=2},
            {cost:150, text:"Perforante", apply:(t)=>t.pierce=2},
            {cost:400, text:"ULTIMATE: Triple Shot", apply:(t)=>{t.multiShot=3;}} 
        ] 
    },
    ice: { 
        name: "Cryo", symbol: "❄️", type: "ice", color: PALETTE.ice, 
        cost: 110, dmg: 6, range: 60, rate: 45, 
        desc: "Ralentiza a los enemigos. Soporte vital.", 
        upgrades: [
            {cost:100, text:"+2s Duración", apply:(t)=>t.slowDur+=120},
            {cost:150, text:"+1 Rango", apply:(t)=>t.range+=20},
            {cost:180, text:"Slow 70%", apply:(t)=>t.slowFactor=0.3},
            {cost:350, text:"ULTIMATE: Congelación", apply:(t)=>{t.freeze=true;}} 
        ] 
    },
    mortar: { 
        name: "Artillería", symbol: "💣", type: "mortar", color: PALETTE.mortar, 
        cost: 200, dmg: 25, range: 100, rate: 90, splash: 40,
        desc: "Daño masivo de área. Lento pero devastador.", 
        upgrades: [
            {cost:120, text:"+Área", apply:(t)=>t.splash+=20},
            {cost:180, text:"+20 Daño", apply:(t)=>t.dmg+=20},
            {cost:200, text:"Recarga -20%", apply:(t)=>t.rate=Math.floor(t.rate*0.8)},
            {cost:650, text:"ULTIMATE: Nuke", apply:(t)=>{t.splash+=40; t.dmg+=200;}} 
        ] 
    },
    electro: { 
        name: "Tesla", symbol: "⚡", type: "electro", color: PALETTE.electro, 
        cost: 220, dmg: 10, range: 70, rate: 45, chain: 3, 
        desc: "Rayos que saltan entre múltiples objetivos.", 
        upgrades: [
            {cost:150, text:"+1 Salto", apply:(t)=>t.chain+=1},
            {cost:200, text:"+8 Daño", apply:(t)=>t.dmg+=8},
            {cost:300, text:"+2 Saltos", apply:(t)=>{t.chain+=2;}},
            {cost:700, text:"ULTIMATE: Tormenta", apply:(t)=>{t.chain=8; t.dmg=Math.floor(t.dmg*1.25);}} 
        ] 
    },
    laser: { 
        name: "Láser", symbol: "🧿", type: "laser", color: PALETTE.laser, 
        cost: 180, dmg: 3, range: 80, rate: 4, 
        desc: "Haz continuo. Derrite blindajes rápidamente.", 
        upgrades: [
            {cost:200, text:"+1 Daño Base", apply:(t)=>t.dmg+=1},
            {cost:250, text:"+1 Rango", apply:(t)=>t.range+=20},
            {cost:300, text:"Quemadura", apply:(t)=>t.burn=true},
            {cost:650, text:"ULTIMATE: Disintegrator", apply:(t)=>{t.rate=3; t.dmg+=2;}} 
        ] 
    },
    sniper: { 
        name: "Railgun", symbol: "🔭", type: "sniper", color: PALETTE.sniper, 
        cost: 450, dmg: 300, range: 180, rate: 150, 
        desc: "Elimina enemigos fuertes de un solo disparo.", 
        upgrades: [
            {cost:250, text:"+100 Daño", apply:(t)=>t.dmg+=100},
            {cost:400, text:"Perforante", apply:(t)=>t.pierce=3},
            {cost:500, text:"Recarga -25%", apply:(t)=>t.rate=Math.floor(t.rate*0.75)},
            {cost:1500, text:"ULTIMATE: One-Shot", apply:(t)=>{t.dmg+=600; t.pierce=8;}} 
        ] 
    },
    minigun: { 
        name: "Vulcan", symbol: "🎰", type: "minigun", color: PALETTE.minigun, 
        cost: 500, dmg: 11, range: 80, rate: 5, 
        desc: "Lluvia de balas incesante.", 
        upgrades: [
            {cost:600, text:"+4 Daño", apply:(t)=>t.dmg+=4},
            {cost:900, text:"+1 Rango", apply:(t)=>t.range+=20},
            {cost:1200, text:"Precisión", apply:(t)=>{t.dmg=Math.floor(t.dmg*1.1);}},
            {cost:3500, text:"ULTIMATE: Bullet Hell", apply:(t)=>{t.multiShot=2;}} 
        ] 
    },
    plasma: { 
        name: "Inferno", symbol: "☀️", type: "plasma", color: PALETTE.plasma, 
        cost: 350, dmg: 7, range: 70, rate: 6, splash: 30,
        desc: "Deja zonas de daño persistente.", 
        upgrades: [
            {cost:900, text:"+Área 20%", apply:(t)=>t.splash*=1.2},
            {cost:1000, text:"+30 Daño (DPS)", apply:(t)=>t.dmg+=3},
            {cost:1200, text:"Napalm", apply:(t)=>t.burn=true},
            {cost:3000, text:"ULTIMATE: Supernova", apply:(t)=>{t.splash*=1.5; t.dmg=Math.floor(t.dmg*2.25);}} 
        ] 
    },
    titan: { 
        name: "Titan", symbol: "👑", type: "titan", color: PALETTE.titan, 
        cost: 2000, dmg: 600, range: 140, rate: 120, splash: 60,
        desc: "Poder absoluto.", 
        upgrades: [
            {cost:2500, text:"+600 Daño", apply:(t)=>t.dmg+=600},
            {cost:3500, text:"Rango Global", apply:(t)=>t.range=300},
            {cost:5000, text:"Recarga -30%", apply:(t)=>t.rate=Math.floor(t.rate*0.7)},
            {cost:15000, text:"ULTIMATE: APOCALIPSIS", apply:(t)=>{t.dmg=6000; t.splash=100;}} 
        ] 
    }
};

// --- SIMULACIÓN VISUAL (SOLO TORRE) ---
let simLoop;
let simTower = null;

function startPreview(canvasId, towerKey, levelIndex) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    
    // Configurar Torre Visual
    const base = TOWER_DATA[towerKey];
    simTower = {
        key: towerKey,
        color: base.color,
        level: levelIndex, // 0=Base, 1=Lvl2...
        multiShot: 0
    };

    // Aplicar mejoras solo para visuales (multishot, etc)
    for(let i=0; i<levelIndex; i++) {
        if(base.upgrades[i]) base.upgrades[i].apply(simTower);
    }
    
    if(simLoop) cancelAnimationFrame(simLoop);

    function loop() {
        // Limpiar
        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
        
        // Animación suave
        const time = Date.now() * 0.002;
        const angle = Math.sin(time) * 0.5 - Math.PI/2; // Movimiento de "escaneo"
        const scale = 1.0 + Math.sin(time*3) * 0.05; // Respiración

        ctx.save();
        ctx.translate(w/2, h/2);
        
        // Dibujar Torre
        // Base
        ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.stroke();
        
        // Indicadores de Nivel (Puntos alrededor)
        const lvlColor = simTower.level >= 4 ? '#ffd700' : simTower.color;
        for(let i=0; i<simTower.level; i++) { 
            ctx.fillStyle = lvlColor;
            ctx.beginPath(); ctx.arc(-10 + i*7, -22, 3, 0, Math.PI*2); ctx.fill(); 
        }

        // Rotar Torre
        ctx.rotate(angle);
        ctx.scale(scale, scale);
        
        // Glow effect
        ctx.shadowBlur = 15; ctx.shadowColor = simTower.color; ctx.fillStyle = simTower.color;
        ctx.strokeStyle = simTower.color;

        // Formas Específicas
        if(simTower.key === 'cannon' || simTower.key === 'mortar' || simTower.key === 'plasma') { 
            ctx.fillRect(-12,-12,24,24); 
            ctx.fillStyle = '#111'; ctx.fillRect(0,-4,24,8); 
            ctx.strokeStyle = simTower.color; ctx.strokeRect(-12,-12,24,24);
        }
        else if (simTower.key === 'bow' || simTower.key === 'sniper') { 
            ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,12); ctx.lineTo(-5,0); ctx.lineTo(-10,-12); ctx.fill(); 
            if(simTower.key === 'sniper') { ctx.fillStyle='#111'; ctx.fillRect(0,-1,25,2); } 
        }
        else if (simTower.key === 'minigun') {
            ctx.fillRect(-10,-10,20,20);
            ctx.fillStyle='#111'; ctx.fillRect(5, -6, 15, 3); ctx.fillRect(5, 0, 15, 3); ctx.fillRect(5, 6, 15, 3);
            if(simTower.multiShot > 0) ctx.fillRect(5, -9, 15, 3);
        }
        else if (simTower.key === 'laser') {
            ctx.beginPath(); 
            ctx.moveTo(10, 0); ctx.lineTo(-8, 8); ctx.lineTo(-8, -8); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.fillRect(-4, -2, 8, 4); 
        }
        else if (simTower.key === 'titan') {
            ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
        }
        else { 
            ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); 
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(5,0,3,0,Math.PI*2); ctx.fill();
        }
        
        ctx.restore();
        simLoop = requestAnimationFrame(loop);
    }
    loop();
}

// --- UI GENERATION ---
const navList = document.getElementById('nav-list');
const mainContent = document.getElementById('main-content');

// Generate Navigation
Object.keys(TOWER_DATA).forEach(key => {
    const t = TOWER_DATA[key];
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.innerHTML = `<span class="tower-dot" style="background:${t.color}"></span> ${t.name}`;
    btn.onclick = () => loadTower(key, btn);
    navList.appendChild(btn);
});

// Load first tower automatically
setTimeout(() => loadTower('cannon', navList.children[1]), 100);

function loadTower(key, btnElement) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if(btnElement) btnElement.classList.add('active');

    const t = TOWER_DATA[key];
    renderTowerView(key, 0); // Start at Base Level
}

function renderTowerView(key, activeLevel) {
    const t = TOWER_DATA[key];
    
    // Calculate Stats based on activeLevel
    // Clone object simply to calculate
    let tempTower = { dmg: t.dmg, rate: t.rate, range: t.range };
    for(let i=0; i<activeLevel; i++) {
        if(t.upgrades[i]) t.upgrades[i].apply(tempTower);
    }

    const shotsPerSec = 60 / tempTower.rate;
    const dps = (tempTower.dmg * shotsPerSec).toFixed(1);

    const html = `
        <div class="card">
            <div class="header-row">
                <div class="preview-container">
                    <canvas id="preview-canvas" class="preview-canvas" width="150" height="150"></canvas>
                </div>
                <div class="title-block">
                    <h1 style="color:${t.color}">${t.name}</h1>
                    <div class="subtitle">${t.desc}</div>
                    <div class="cost-badge">COSTE BASE: $${t.cost}</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#ff5252">${tempTower.dmg.toFixed(0)}</span>
                    <span class="stat-label">Daño</span>
                </div>
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#448aff">${shotsPerSec.toFixed(1)}/s</span>
                    <span class="stat-label">Velocidad</span>
                </div>
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#69f0ae">${(tempTower.range/TILE).toFixed(1)}</span>
                    <span class="stat-label">Rango</span>
                </div>
                <div class="stat-box updated">
                    <span class="stat-val" style="color:#ffd740">${dps}</span>
                    <span class="stat-label">DPS Est.</span>
                </div>
            </div>

            <h2>ÁRBOL DE MEJORAS (Haz Click para previsualizar)</h2>
            <div class="base-btn ${activeLevel === 0 ? 'active' : ''}" onclick="renderTowerView('${key}', 0)">
                NIVEL 1: BASE (RESETEAR VISTA)
            </div>
            <div class="upgrade-list">
                ${t.upgrades.map((upg, i) => `
                    <div class="upgrade-item ${i===3 ? 'ultimate' : ''} ${activeLevel === i+1 ? 'active' : ''}" 
                         onclick="renderTowerView('${key}', ${i+1})">
                        <div class="upg-lvl">NIVEL ${i+2}</div>
                        <div class="upg-desc">${upg.text}</div>
                        <div class="upg-cost">$${upg.cost}</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;

    mainContent.innerHTML = html;
    
    // Start Sim
    startPreview('preview-canvas', key, activeLevel);
}

</script>
</body>
</html>
